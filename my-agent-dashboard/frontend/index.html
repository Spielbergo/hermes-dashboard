<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --accent: #7c6af7;
      --accent-dim: #4e46a0;
      --text: #e2e4f0;
      --text-dim: #8b8fa8;
      --error: #f87171;
      --success: #4ade80;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .login-card p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field label { font-size: 0.85rem; color: var(--text-dim); font-weight: 500; }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.7rem 1rem;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:hover { background: var(--accent-dim); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: var(--error);
      font-size: 0.85rem;
      display: none;
    }

    /* ── App shell ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
    }

    .logout-btn:hover { border-color: var(--text-dim); color: var(--text); }

    .agent-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      outline: none;
    }
    .agent-select:focus { border-color: var(--accent); }

    /* ── Tabs ── */
    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0;
      padding: 0 1.5rem;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.85rem 1rem;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { border-bottom-color: var(--accent); color: var(--text); font-weight: 500; }

    /* ── Content ── */
    main { flex: 1; padding: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; }

    .panel { display: none; flex-direction: column; gap: 1rem; }
    .panel.active { display: flex; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.85rem;
    }

    /* Memory */
    .memory-content {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Chat ID input */
    .chat-input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .chat-input-row .field { flex: 1; }

    /* Messages */
    .message-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .message {
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.55;
      max-width: 80%;
      padding: 0.6rem 0.85rem;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-dim);
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .message .role {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
      opacity: 0.7;
      text-transform: uppercase;
    }

    /* Summary */
    .summary-content {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* Loading / empty states */
    .state-msg {
      color: var(--text-dim);
      font-size: 0.88rem;
      padding: 1rem 0;
      text-align: center;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      margin-left: auto;
      display: block;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Tasks */
    .task-day { margin-bottom: 0.5rem; }
    .task-day-header {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.87rem;
    }
    .task-item:last-child { border-bottom: none; }
    .task-priority {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 0.1rem;
      text-transform: uppercase;
    }
    .task-priority.high   { background: #7f1d1d; color: #fca5a5; }
    .task-priority.medium { background: #78350f; color: #fcd34d; }
    .task-priority.low    { background: #14532d; color: #86efac; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-weight: 500; }
    .task-context { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.15rem; }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div>
      <h1>Hermes Dashboard</h1>
      <p style="margin-top:0.4rem">Enter your dashboard token to continue.</p>
    </div>
    <div class="field">
      <label for="token-input">Dashboard Token</label>
      <input id="token-input" type="password" placeholder="••••••••••••" autocomplete="current-password" />
    </div>
    <div class="error-msg" id="login-error">Invalid token or unreachable API.</div>
    <button class="btn" id="login-btn">Sign in</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <h1>⚡ Hermes Dashboard</h1>
    <div class="header-right">
      <select class="agent-select" id="agent-select" style="display:none"></select>
      <span><span class="status-dot"></span> Connected</span>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="memory">State</button>
    <button class="tab" data-tab="sessions">Sessions</button>
    <button class="tab" data-tab="messages">Messages</button>
    <button class="tab" data-tab="tasks">Tasks</button>
  </div>

  <main>
    <!-- State panel -->
    <div class="panel active" id="panel-memory">
      <div class="card">
        <div class="card-title">Agent State
          <button class="refresh-btn" data-refresh="memory">↻ Refresh</button>
        </div>
        <div class="memory-content" id="memory-content">
          <span class="state-msg">Loading…</span>
        </div>
      </div>
    </div>

    <!-- Sessions panel -->
    <div class="panel" id="panel-sessions">
      <div class="card">
        <div class="card-title">Recent Sessions
          <button class="refresh-btn" data-refresh="sessions">↻ Refresh</button>
        </div>
        <div id="sessions-list"><span class="state-msg">Loading…</span></div>
      </div>
    </div>

    <!-- Messages panel -->
    <div class="panel" id="panel-messages">
      <div class="card">
        <div class="card-title">Fetch Messages</div>
        <div class="chat-input-row">
          <div class="field">
            <label for="chat-id-input">Session ID</label>
            <input id="chat-id-input" type="text" placeholder="Click a session above or paste ID" />
          </div>
          <button class="btn" id="fetch-messages-btn" style="min-width:100px">Fetch</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Messages</div>
        <div class="message-list" id="message-list">
          <span class="state-msg">Select a session above or enter a Session ID.</span>
        </div>
      </div>
    </div>
    <!-- Tasks panel -->
    <div class="panel" id="panel-tasks">
      <div class="card">
        <div class="card-title">Daily Task Lists
          <button class="refresh-btn" data-refresh="tasks">↻ Refresh</button>
        </div>
        <div id="tasks-list"><span class="state-msg">Loading…</span></div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── State ──
  let token = '';
  let currentAgent = '';

  // ── Persist session ──
  function saveSession() {
    sessionStorage.setItem('hermes_token', token);
    sessionStorage.setItem('hermes_agent', currentAgent);
  }

  function clearSession() {
    sessionStorage.removeItem('hermes_token');
    sessionStorage.removeItem('hermes_agent');
  }

  // ── API helper — uses relative paths, same origin as the page ──
  async function api(path) {
    const res = await fetch(path, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Login ──
  const loginScreen = document.getElementById('login-screen');
  const appEl = document.getElementById('app');
  const loginError = document.getElementById('login-error');

  document.getElementById('login-btn').addEventListener('click', async () => {
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    loginError.style.display = 'none';

    token = document.getElementById('token-input').value.trim();

    try {
      const { agents } = await api('/api/agents');
      if (!agents.length) throw new Error('No agents configured');
      saveSession();
      showApp();
      populateAgentSelect(agents);
    } catch {
      loginError.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', () => {
    clearSession();
    token = '';
    appEl.style.display = 'none';
    loginScreen.style.display = 'flex';
  });

  function showApp() {
    loginScreen.style.display = 'none';
    appEl.style.display = 'flex';
  }

  // ── Agent selector ──
  function populateAgentSelect(agents) {
    const sel = document.getElementById('agent-select');
    sel.innerHTML = '';
    agents.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.name;
      sel.appendChild(opt);
    });
    // Restore previously selected agent if still valid
    const saved = sessionStorage.getItem('hermes_agent');
    if (saved && agents.find(a => a.id === saved)) {
      sel.value = saved;
    }
    currentAgent = sel.value;
    sel.style.display = agents.length > 1 ? 'inline-block' : 'none';
    loadMemory();
    loadSessions();
    loadTasks();
  }

  document.getElementById('agent-select').addEventListener('change', function() {
    currentAgent = this.value;
    sessionStorage.setItem('hermes_agent', currentAgent);
    // Clear messages panel when switching agents
    document.getElementById('message-list').innerHTML = '<span class="state-msg">Select a session above or enter a Session ID.</span>';
    document.getElementById('chat-id-input').value = '';
    loadMemory();
    loadSessions();
    // Tasks are not agent-scoped, no reload needed
  });

  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // ── Core Memory ──
  async function loadMemory() {
    const el = document.getElementById('memory-content');
    el.innerHTML = '<span class="state-msg">Loading…</span>';
    try {
      const data = await api(`/api/${currentAgent}/memory`);
      el.textContent = data.memory || '(no facts stored yet)';
    } catch (e) {
      el.innerHTML = `<span class="state-msg" style="color:var(--error)">Error: ${e.message}</span>`;
    }
  }

  document.querySelector('[data-refresh="memory"]').addEventListener('click', loadMemory);

  // ── Sessions ──
  async function loadSessions() {
    const list = document.getElementById('sessions-list');
    list.innerHTML = '<span class="state-msg">Loading…</span>';
    try {
      const data = await api(`/api/${currentAgent}/sessions`);
      if (!data.sessions.length) {
        list.innerHTML = '<span class="state-msg">No sessions found.</span>';
        return;
      }
      list.innerHTML = '';
      data.sessions.forEach(s => {
        const started = s.started_at ? new Date(s.started_at * 1000).toLocaleString() : '—';
        const cost = s.estimated_cost_usd != null ? `$${Number(s.estimated_cost_usd).toFixed(4)}` : '—';
        const title = s.title || s.id.slice(0, 16) + '…';
        const div = document.createElement('div');
        div.style.cssText = 'padding:0.75rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:1rem;';
        div.innerHTML = `
          <div style="flex:1;min-width:0">
            <div style="font-size:0.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(title)}</div>
            <div style="font-size:0.76rem;color:var(--text-dim);margin-top:0.2rem">${escapeHtml(s.source || '')} &middot; ${escapeHtml(s.model || '')} &middot; ${s.message_count ?? 0} msgs &middot; ${cost}</div>
            <div style="font-size:0.76rem;color:var(--text-dim)">${started}</div>
          </div>
          <button class="btn" style="font-size:0.78rem;padding:0.3rem 0.6rem;min-width:80px" data-session-id="${escapeHtml(s.id)}">View</button>
        `;
        div.querySelector('button').addEventListener('click', () => {
          document.getElementById('chat-id-input').value = s.id;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.querySelector('[data-tab="messages"]').classList.add('active');
          document.getElementById('panel-messages').classList.add('active');
          document.getElementById('fetch-messages-btn').click();
        });
        list.appendChild(div);
      });
    } catch (e) {
      list.innerHTML = `<span class="state-msg" style="color:var(--error)">Error: ${e.message}</span>`;
    }
  }

  document.querySelector('[data-refresh="sessions"]').addEventListener('click', loadSessions);

  // ── Messages ──
  document.getElementById('fetch-messages-btn').addEventListener('click', async () => {
    const chatId = document.getElementById('chat-id-input').value.trim();
    if (!chatId) return;
    const list = document.getElementById('message-list');
    list.innerHTML = '<span class="state-msg">Loading…</span>';
    try {
      const data = await api(`/api/${currentAgent}/messages/${encodeURIComponent(chatId)}`);
      if (!data.messages.length) {
        list.innerHTML = '<span class="state-msg">No messages found for this Chat ID.</span>';
        return;
      }
      list.innerHTML = '';
      data.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role === 'user' ? 'user' : 'assistant'}`;
        const label = msg.role === 'tool' ? `tool: ${escapeHtml(msg.tool_name || '')}` : msg.role;
        div.innerHTML = `<div class="role">${label}</div>${escapeHtml(msg.content || '(no content)')}`;
        list.appendChild(div);
      });
    } catch (e) {
      list.innerHTML = `<span class="state-msg" style="color:var(--error)">Error: ${e.message}</span>`;
    }
  });

  // ── Summary removed — replaced by Sessions ──

  // ── Tasks ──
  async function loadTasks() {
    const list = document.getElementById('tasks-list');
    list.innerHTML = '<span class="state-msg">Loading…</span>';
    try {
      const data = await api('/api/tasks');
      if (!data.reports.length) {
        list.innerHTML = '<span class="state-msg">No task reports yet. They will appear here after a call transcript is processed.</span>';
        return;
      }
      list.innerHTML = '';
      data.reports.forEach(report => {
        const day = document.createElement('div');
        day.className = 'task-day card';
        day.style.marginBottom = '0.75rem';
        const source = report.source ? ` <span style="font-weight:400;opacity:0.6">— ${escapeHtml(report.source)}</span>` : '';
        day.innerHTML = `<div class="task-day-header">📋 ${escapeHtml(report.date)}${source}</div>`;
        (report.tasks || []).forEach(task => {
          const pri = (task.priority || 'medium').toLowerCase();
          const contextParts = [];
          if (task.context) contextParts.push(escapeHtml(task.context));
          if (task.assigned_to) contextParts.push(`Assigned: ${escapeHtml(task.assigned_to)}`);
          if (task.due) contextParts.push(`Due: ${escapeHtml(task.due)}`);
          const item = document.createElement('div');
          item.className = 'task-item';
          item.innerHTML = `
            <span class="task-priority ${pri}">${pri}</span>
            <div class="task-body">
              <div class="task-title">${escapeHtml(task.title || '')}</div>
              ${contextParts.length ? `<div class="task-context">${contextParts.join(' · ')}</div>` : ''}
            </div>`;
          day.appendChild(item);
        });
        list.appendChild(day);
      });
    } catch (e) {
      list.innerHTML = `<span class="state-msg" style="color:var(--error)">Error: ${e.message}</span>`;
    }
  }

  document.querySelector('[data-refresh="tasks"]').addEventListener('click', loadTasks);

  // ── XSS helper ──
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Auto-restore session ──
  const savedToken = sessionStorage.getItem('hermes_token');
  if (savedToken) {
    token = savedToken;
    api('/api/agents')
      .then(({ agents }) => {
        if (!agents.length) throw new Error('No agents');
        showApp();
        populateAgentSelect(agents);
      })
      .catch(() => { clearSession(); });
  }
</script>
</body>
</html>
