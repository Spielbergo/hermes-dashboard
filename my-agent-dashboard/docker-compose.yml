services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"   # Only expose to localhost — nginx proxies externally
    environment:
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - PORT=5173
      - DB_PATH=/data/memory.db  # Mounted from Hermes's data volume
    volumes:
      - hermes_data:/data:ro     # Read-only mount of Hermes's data volume

# Attach to the named volume Hermes already created.
# Run: docker volume ls   to find the exact volume name and update below.
volumes:
  hermes_data:
    external: true
    name: hermes-agent_data      # <-- replace with your actual volume name
