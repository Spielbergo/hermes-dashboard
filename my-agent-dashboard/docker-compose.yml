services:
  dashboard:
    build: .
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - PORT=5173
      - DB_PATH=/data/memory.db
    volumes:
      - /docker/hermes-agent-tshi/data:/data:ro  # Bind mount Hermes's data dir, read-only
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.yourdomain.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=5173"

networks:
  traefik-public:
    external: true
