services:
  dashboard:
    build: .
    restart: unless-stopped
    environment:
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN}
      - PORT=5173
      # Multi-agent: semicolon-separated entries of "id:Display Name:/mount/path/state.db"
      - AGENTS=cli:Hermes CLI:/data/cli/state.db;webui:Hermes WebUI:/data/webui/state.db;host:Hermes Gateway:/data/host/state.db
      # Drive polling control
      - TRANSCRIPT_PROCESSOR_URL=${TRANSCRIPT_PROCESSOR_URL}
      - TRANSCRIPT_PROCESSOR_SECRET=${TRANSCRIPT_PROCESSOR_SECRET}
    volumes:
      # CLI agent — bind mount (host path)
      - /docker/hermes-agent-tshi/data:/data/cli
      # WebUI agent — named volume (Docker-managed)
      - hermes-webui-8qvh_hermes-home:/data/webui
      # Host gateway agent — where webhook-processed transcripts are stored
      - /root/.hermes:/data/host
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=my-agent-dashboard_default"
      - "traefik.http.routers.my-agent-dashboard.entrypoints=websecure"
      - "traefik.http.routers.my-agent-dashboard.rule=Host(`my-agent-dashboard.srv1694637.hstgr.cloud`)"
      - "traefik.http.routers.my-agent-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.my-agent-dashboard.loadbalancer.server.port=5173"

volumes:
  hermes-webui-8qvh_hermes-home:
    external: true
